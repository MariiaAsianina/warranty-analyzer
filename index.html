<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Аналітика гарантійних обмінів</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
  <div id="login-screen">
    <div class="login-box">
      <div class="login-logo">Аналітика <span>гарантійних обмінів</span></div>
      <p class="login-hint">Введіть пароль для доступу</p>
      <input type="password" id="login-pass" class="input" placeholder="Пароль" autocomplete="current-password">
      <button id="login-btn" class="btn">Увійти</button>
      <p id="login-error" class="login-error">Неправильний пароль</p>
    </div>
  </div>

  <div id="site-content" style="display:none">
  <header class="app-header">
    <h1>Аналітика гарантійних обмінів</h1>
    <div class="upload-box">
      <label for="file-input" class="btn">Завантажити звіт (.xls / .xlsx)</label>
      <input type="file" id="file-input" accept=".xls,.xlsx" hidden>
      <span id="file-name" class="file-name"></span>
    </div>
  </header>

  <div id="error" hidden></div>

  <div id="app" hidden>
    <div class="filter-bar" id="filter-bar">
      <div class="filter-field">
        <label>Період з</label>
        <input type="date" id="f-date-from" class="input">
      </div>
      <div class="filter-field">
        <label>Період по</label>
        <input type="date" id="f-date-to" class="input">
      </div>
      <div class="filter-field">
        <label>Модель</label>
        <select id="f-model" class="input"><option value="">Усі</option></select>
      </div>
      <div class="filter-field">
        <label>IMEI</label>
        <input type="text" id="f-imei" class="input" placeholder="пошук...">
      </div>
      <div class="filter-field">
        <label>Власник партії</label>
        <select id="f-owner" class="input"><option value="">Усі</option></select>
      </div>
      <div class="filter-field">
        <label>Магазин</label>
        <select id="f-store" class="input"><option value="">Усі</option></select>
      </div>
      <div class="filter-field">
        <label>Майстер</label>
        <select id="f-master" class="input"><option value="">Усі</option></select>
      </div>
      <div class="filter-field">
        <label>Причина</label>
        <select id="f-reason" class="input"><option value="">Усі</option></select>
      </div>
      <div class="filter-field">
        <label>Мін. ремонтів</label>
        <select id="f-min-repairs" class="input">
          <option value="0">Усі</option>
          <option value="1">1+</option>
          <option value="2">2+</option>
          <option value="3">3+</option>
        </select>
      </div>
      <div class="filter-field">
        <label>Статус IMEI</label>
        <select id="f-problem" class="input">
          <option value="all">Усі</option>
          <option value="problem">Лише проблемні</option>
          <option value="normal">Лише без проблем</option>
        </select>
      </div>
      <button id="f-reset" class="btn btn-ghost">Скинути фільтри</button>
    </div>

    <nav class="tabs" id="tabs">
      <button class="tab-btn active" data-tab="dashboard">Дашборд</button>
      <button class="tab-btn" data-tab="imei">IMEI</button>
      <button class="tab-btn" data-tab="owners">Власники партій</button>
      <button class="tab-btn" data-tab="masters">Майстри</button>
      <button class="tab-btn" data-tab="models">Моделі</button>
      <button class="tab-btn" data-tab="reasons">Причини</button>
      <button class="tab-btn" data-tab="details">Деталізація</button>
    </nav>

    <main id="tab-content"></main>
  </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/aggregations.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/state.js"></script>
  <script src="js/parser.js"></script>
  <script src="js/tabs/dashboard.js"></script>
  <script src="js/tabs/imei.js"></script>
  <script src="js/tabs/owners.js"></script>
  <script src="js/tabs/masters.js"></script>
  <script src="js/tabs/models.js"></script>
  <script src="js/tabs/reasons.js"></script>
  <script src="js/tabs/details.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
